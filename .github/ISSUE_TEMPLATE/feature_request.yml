name: 💡 功能建议
description: 提议一个新功能、新场景，或改进现有体验
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题？
      description: 你为什么希望有这个功能，目前的痛点是什么？
      placeholder: 例如：希望加入"夜店"场景，但现有场景模板不支持音乐节奏属性。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提议方案
      description: 想象一下功能长什么样、如何使用。可附草图、伪代码。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你想到过的其他做法，以及为什么没选。
